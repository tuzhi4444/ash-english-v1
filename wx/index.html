<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ash英语（微信分享版）</title>
  <meta name="description" content="Ash英语：单词+语法一体学习" />
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#fff;color:#111}
    .wrap{max-width:680px;margin:0 auto;padding:24px 16px;text-align:center}
    .logo{width:96px;height:auto}
    h1{font-size:24px;margin:10px 0}
    p{color:#666;line-height:1.6}
    .btn{display:block;margin:12px auto;padding:12px 16px;border-radius:12px;border:1px solid #d1d5db;text-decoration:none;color:#111;max-width:320px}
    .primary{background:#16a34a;color:#fff;border-color:#16a34a}
    .tip{margin-top:16px;font-size:13px;color:#6b7280}
  </style>
</head>
<body>
  <div class="wrap">
    <img src="../words/logo.png" class="logo" alt="Ash英语" />
    <h1>Ash英语（微信分享版）</h1>
    <p>单词 + 语法一体学习，支持手机使用。</p>
    <a class="btn primary" href="../?v=wx1">打开 Ash英语</a>
    <button class="btn" id="copyBtn">复制分享链接</button>
    <div class="tip">在微信里可直接点右上角“···”转发给好友。</div>
  </div>
  <script>
    const link = 'https://tuzhi4444.github.io/ash-english-v1/wx/';
    document.getElementById('copyBtn').onclick = async () => {
      try { await navigator.clipboard.writeText(link); alert('已复制链接'); }
      catch { prompt('请手动复制：', link); }
    };
  </script>
