<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>英语记忆卡片 V2</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
:root{--bg:#ffffff;--panel:#ffffff;--card:#ffffff;--text:#111827;--muted:#6b7280;--flip:#3b82f6;--know:#22c55e;--blur:#f59e0b;--dont:#ef4444}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#fff;color:var(--text)}
.app{max-width:900px;margin:0 auto;min-height:100vh;padding:16px;display:flex;flex-direction:column;gap:14px}
.logo-wrap{display:flex;justify-content:center;margin-top:6px}.logo{width:96px;height:auto}
.topbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:10px}.stat span{font-size:12px;color:var(--muted);display:block}.stat strong{font-size:20px}
.modebar{display:flex;gap:8px;flex-wrap:wrap}.mini{border:1px solid #d1d5db;background:#fff;color:#111827;border-radius:999px;padding:8px 12px;cursor:pointer}.mini.on{background:#dbeafe;border-color:#3b82f6}
.card-wrap{display:flex;justify-content:center}.card{width:min(92vw,760px);min-height:280px;background:#fff;border:1px solid #e5e7eb;border-radius:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;transition:.2s}.card.revealed{border-color:#3b82f699;box-shadow:0 10px 24px #3b82f633}
.prompt{font-size:clamp(28px,5vw,54px);font-weight:800;text-align:center}.answer{display:none;margin-top:12px;font-size:clamp(24px,4.5vw,46px);color:#1d4ed8;font-weight:700;word-break:break-word}.card.revealed .answer{display:block}
.dictation{width:min(92vw,760px);margin:0 auto;display:flex;gap:8px;align-items:center}.dictation input{flex:1;padding:12px;border-radius:10px;border:1px solid #d1d5db;background:#fff;color:#111827}.dict-result{min-height:22px;color:var(--muted)}.hidden{display:none}
.hint{width:min(92vw,760px);margin:0 auto;display:flex;justify-content:space-between;color:var(--muted)}
.actions{width:min(92vw,760px);margin:0 auto;display:flex;flex-direction:column;gap:10px}.judge-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.btn{border:none;border-radius:12px;padding:14px 12px;color:#fff;font-weight:700;cursor:pointer}.btn:disabled{opacity:.45;cursor:not-allowed}.btn-flip{background:var(--flip)}.btn-know{background:var(--know)}.btn-blur{background:var(--blur)}.btn-dont{background:var(--dont)}
.view{display:none}.view.active{display:block}.result-card{width:min(92vw,760px);margin:20px auto;background:linear-gradient(160deg,var(--card),var(--panel));border:1px solid #ffffff1f;border-radius:18px;padding:20px}.result-card h2{margin:0 0 12px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.grid>div{background:#ffffff0a;border:1px solid #ffffff1f;border-radius:10px;padding:10px}.grid span{display:block;color:var(--muted);font-size:12px}.grid strong{font-size:20px}.result-actions{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:680px){.topbar{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
  <div class="app">
    <div class="logo-wrap"><img src="logo.png" alt="Ash单词Logo" class="logo"></div>
    <header class="topbar">
      <div class="stat"><span>分数</span><strong id="score">0</strong></div>
      <div class="stat"><span>最高分</span><strong id="highScore">0</strong></div>
      <div class="stat"><span>连击</span><strong id="streak">0</strong></div>
      <div class="stat"><span>进度</span><strong><span id="currentQ">1</span>/<span id="totalQ">20</span></strong></div>
    </header>

    <main id="gameView" class="view active">
      <div class="modebar">
        <button id="modeCard" class="mini on">普通卡片</button>
        <button id="modeDictation" class="mini">听写模式</button>
        <button id="modeSpelling" class="mini">拼写模式</button>
        <button id="today50" class="mini">今日艾宾浩斯</button>
        <button id="customVocabBtn" class="mini">自定义词库</button>
        <input id="customVocabFile" type="file" accept=".json,.csv,.txt" style="display:none;" />
        <button id="speakEn" class="mini">🔊 英文</button>
        <button id="speakZh" class="mini">🔊 中文</button>
        <button id="autoSpeak" class="mini">自动发音：关</button>
      </div>

      <section class="card-wrap">
        <div class="card" id="card">
          <div id="prompt" class="prompt">中文提示</div>
          <div id="answer" class="answer">english</div>
        </div>
      </section>

      <section id="dictationBox" class="dictation hidden">
        <input id="dictInput" type="text" placeholder="输入你想到的英文..." autocomplete="off" />
        <button id="checkInput" class="btn btn-flip">检查</button>
        <div id="dictResult" class="dict-result"></div>
      </section>

      <div class="hint"><span id="remain">剩余 20 题</span><span id="modeInfo">普通模式</span></div>

      <section class="actions">
        <button id="flip" class="btn btn-flip">翻卡</button>
        <div class="judge-row">
          <button id="know" class="btn btn-know" disabled>认识</button>
          <button id="blur" class="btn btn-blur" disabled>模糊</button>
          <button id="dont" class="btn btn-dont" disabled>不认识</button>
        </div>
      </section>
    </main>

    <section id="resultView" class="view">
      <div class="result-card">
        <h2>本局完成 🎯</h2>
        <div class="grid">
          <div><span>本轮得分</span><strong id="rScore"></strong></div>
          <div><span>最高分</span><strong id="rHigh"></strong></div>
          <div><span>认识</span><strong id="rKnow"></strong></div>
          <div><span>模糊</span><strong id="rBlur"></strong></div>
          <div><span>不认识</span><strong id="rDont"></strong></div>
          <div><span>最高连击</span><strong id="rStreak"></strong></div>
          <div><span>总练习次数</span><strong id="rRuns"></strong></div>
          <div><span>新纪录</span><strong id="rNew"></strong></div>
        </div>
        <div class="result-actions">
          <button id="restart" class="btn btn-flip">再来一局</button>
          <button id="replayWrong" class="btn btn-blur">再练错题</button>
        </div>
      </div>
    </section>
  </div>

  <script>
(() => {
  const KEY = 'word_game_v2';
  const BASE_ROUND = 20;

  const $ = id => document.getElementById(id);
  const el = {
    score: $('score'), highScore: $('highScore'), streak: $('streak'), currentQ: $('currentQ'), totalQ: $('totalQ'), remain: $('remain'), modeInfo: $('modeInfo'),
    card: $('card'), prompt: $('prompt'), answer: $('answer'),
    flip: $('flip'), know: $('know'), blur: $('blur'), dont: $('dont'),
    gameView: $('gameView'), resultView: $('resultView'),
    rScore: $('rScore'), rHigh: $('rHigh'), rKnow: $('rKnow'), rBlur: $('rBlur'), rDont: $('rDont'), rStreak: $('rStreak'), rRuns: $('rRuns'), rNew: $('rNew'),
    restart: $('restart'), replayWrong: $('replayWrong'),
    modeCard: $('modeCard'), modeDictation: $('modeDictation'), modeSpelling: $('modeSpelling'), today50: $('today50'),
    speakEn: $('speakEn'), speakZh: $('speakZh'), autoSpeak: $('autoSpeak'),
    dictationBox: $('dictationBox'), dictInput: $('dictInput'), checkInput: $('checkInput'), dictResult: $('dictResult')
  };

  const store = load();
  let state = {};

  function load() {
    const d = {
      highScore: 0,
      totalRuns: 0,
      mastery: {},
      ebbinghaus: { cursor: 0, progress: {}, lastPlanDate: '', todayQueue: [] }
    };
    try {
      const x = Object.assign(d, JSON.parse(localStorage.getItem(KEY) || '{}'));
      x.ebbinghaus = Object.assign(d.ebbinghaus, x.ebbinghaus || {});
      x.ebbinghaus.progress = x.ebbinghaus.progress || {};
      x.ebbinghaus.todayQueue = x.ebbinghaus.todayQueue || [];
      return x;
    } catch { return d; }
  }
  function save() { localStorage.setItem(KEY, JSON.stringify(store)); }

  const EBB_GAPS = [1, 2, 4, 7, 15]; // 简化版艾宾浩斯间隔
  const DAILY_NEW = 20;
  const DAILY_MAX = 120;

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function addDays(dateStr, n) {
    const d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() + n);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function buildEbbinghausQueue() {
    const t = todayStr();
    const e = store.ebbinghaus;

    if (e.lastPlanDate === t && e.todayQueue.length) {
      return e.todayQueue.map(idx => WORDS[idx]).filter(Boolean);
    }

    const due = [];
    for (let i = 0; i < WORDS.length; i++) {
      const key = WORDS[i].en;
      const p = e.progress[key];
      if (p && p.nextDue && p.nextDue <= t) due.push(i);
    }

    // 按词表顺序 due + new
    const queueIdx = due.slice(0, DAILY_MAX);
    const remain = DAILY_MAX - queueIdx.length;
    const allowNew = Math.min(DAILY_NEW, Math.max(0, remain));

    let addNew = 0;
    while (addNew < allowNew && e.cursor < WORDS.length) {
      queueIdx.push(e.cursor);
      e.cursor += 1;
      addNew += 1;
    }

    e.lastPlanDate = t;
    e.todayQueue = queueIdx;
    save();

    return queueIdx.map(i => WORDS[i]).filter(Boolean);
  }

  function updateEbbinghausProgress(word, type) {
    const t = todayStr();
    const e = store.ebbinghaus;
    const key = word.en;
    const old = e.progress[key] || { stage: 0, learned: t, nextDue: t };

    let stage = old.stage;
    let nextDue = old.nextDue;

    if (type === 'know') {
      stage = Math.min(stage + 1, EBB_GAPS.length - 1);
      nextDue = addDays(t, EBB_GAPS[stage]);
    } else if (type === 'blur') {
      nextDue = addDays(t, 1);
    } else {
      stage = 0;
      nextDue = addDays(t, 1);
    }

    e.progress[key] = { stage, learned: old.learned || t, nextDue };
  }

  function updateAutoSpeakBtn() {
    el.autoSpeak.textContent = `自动发音：${state.autoSpeak ? '开' : '关'}`;
    el.autoSpeak.classList.toggle('on', state.autoSpeak);
  }

  function pickVoice(langPrefix) {
    const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    return voices.find(v => (v.lang || '').toLowerCase().startsWith(langPrefix.toLowerCase())) || voices[0];
  }

  function speak(text, lang='en-US') {
    if (!('speechSynthesis' in window) || !text) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    const voice = lang.startsWith('zh') ? pickVoice('zh') : pickVoice('en');
    if (voice) u.voice = voice;
    u.rate = 0.95;
    window.speechSynthesis.speak(u);
  }

  function masteryOf(w) { return Math.max(0, Number(store.mastery[w.en] || 0)); }
  function setMastery(w, v) { store.mastery[w.en] = Math.max(0, Math.floor(v)); }
  function weight(w) { return Math.max(1, 6 - Math.min(5, masteryOf(w))); }

  function pickWeighted(pool) {
    let total = 0; for (const w of pool) total += weight(w);
    let r = Math.random() * total;
    for (const w of pool) { r -= weight(w); if (r <= 0) return w; }
    return pool[pool.length - 1];
  }

  // 按词表顺序出题（不随机）
  function buildDeck(pool, n) {
    return pool.slice(0, n);
  }

  function init(mode = 'card', pool = WORDS, roundSize = BASE_ROUND) {
    state = {
      mode, pool, deck: buildDeck(pool, Math.min(roundSize, Math.max(1, pool.length))),
      idx: 0, revealed: false,
      score: 0, streak: 0, maxStreak: 0,
      know: 0, blur: 0, dont: 0,
      wrongMap: new Map(), checkedInput: false,
      autoSpeak: Boolean(store.autoSpeak)
    };
    el.totalQ.textContent = state.deck.length;
    switchView('game');
    renderCurrent();
  }

  function renderCurrent() {
    const w = state.deck[state.idx];
    state.revealed = false;
    state.checkedInput = false;
    el.card.classList.remove('revealed');
    el.prompt.textContent = w.zh;
    el.answer.textContent = w.en;
    el.dictInput.value = '';
    el.dictResult.textContent = '';

    const left = state.deck.length - state.idx;
    el.currentQ.textContent = state.idx + 1;
    el.remain.textContent = `剩余 ${left} 题`;
    el.modeInfo.textContent = state.mode === 'dictation'
      ? '听写模式（艾宾浩斯计划）'
      : state.mode === 'spelling'
        ? '拼写模式（艾宾浩斯计划）'
        : '普通模式（艾宾浩斯计划）';
    el.score.textContent = state.score;
    el.highScore.textContent = store.highScore;
    el.streak.textContent = state.streak;

    if (state.mode === 'dictation' || state.mode === 'spelling') {
      el.dictationBox.classList.remove('hidden');
      el.flip.textContent = state.mode === 'spelling' ? '拼写后自动翻卡' : '翻卡(可跳过输入)';
      el.checkInput.textContent = state.mode === 'spelling' ? '提交拼写' : '检查';
    } else {
      el.dictationBox.classList.add('hidden');
      el.flip.textContent = '翻卡';
    }
    updateAutoSpeakBtn();

    lockJudge(true);
    el.flip.disabled = state.mode === 'spelling';
  }

  function lockJudge(lock) {
    el.know.disabled = lock; el.blur.disabled = lock; el.dont.disabled = lock;
  }

  function reveal() {
    if (state.revealed) return;
    state.revealed = true;
    el.card.classList.add('revealed');
    el.flip.disabled = true;
    lockJudge(false);
    if (state.autoSpeak) {
      const w = state.deck[state.idx];
      speak(w.en, 'en-US');
    }
  }

  function checkInput() {
    if (state.mode !== 'dictation' && state.mode !== 'spelling') return;
    const w = state.deck[state.idx];
    const user = el.dictInput.value.trim().toLowerCase();
    const ans = String(w.en).trim().toLowerCase();
    if (!user) { el.dictResult.textContent = '先输入再检查'; return; }

    const ok = user === ans;
    if (ok) {
      el.dictResult.textContent = '✅ 拼写正确';
    } else {
      el.dictResult.textContent = `❌ 你的答案: ${user}（正确：${ans}）`;
    }

    state.checkedInput = true;

    if (state.mode === 'spelling') {
      // 拼写模式：提交后自动判分并下一题
      reveal();
      setTimeout(() => judge(ok ? 'know' : 'dont'), 450);
      return;
    }

    // 听写模式：先翻卡，再手动三档评价
    reveal();
  }

  function judge(type) {
    const w = state.deck[state.idx];
    const m = masteryOf(w);

    if (type === 'know') {
      state.score += 2; state.know++; state.streak++; state.maxStreak = Math.max(state.maxStreak, state.streak); setMastery(w, m + 1);
    } else if (type === 'blur') {
      state.score += 1; state.blur++; state.streak = 0; setMastery(w, m); state.wrongMap.set(w.en, w);
    } else {
      state.dont++; state.streak = 0; setMastery(w, m - 1); state.wrongMap.set(w.en, w);
    }
    updateEbbinghausProgress(w, type);
    save();
    next();
  }

  function next() {
    state.idx++;
    if (state.idx >= state.deck.length) return finish();
    renderCurrent();
  }

  function finish() {
    store.totalRuns++;
    const isNew = state.score > store.highScore;
    if (isNew) store.highScore = state.score;
    save();

    el.rScore.textContent = state.score;
    el.rHigh.textContent = store.highScore;
    el.rKnow.textContent = state.know;
    el.rBlur.textContent = state.blur;
    el.rDont.textContent = state.dont;
    el.rStreak.textContent = state.maxStreak;
    el.rRuns.textContent = store.totalRuns;
    el.rNew.textContent = isNew ? '是 ✅' : '否';
    el.replayWrong.disabled = state.wrongMap.size === 0;
    el.replayWrong.textContent = state.wrongMap.size ? `再练错题（${state.wrongMap.size}）` : '再练错题（无）';

    switchView('result');
  }

  function switchView(v) {
    if (v === 'game') {
      el.gameView.classList.add('active');
      el.resultView.classList.remove('active');
    } else {
      el.gameView.classList.remove('active');
      el.resultView.classList.add('active');
    }
  }

  function setModeButton(mode) {
    el.modeCard.classList.toggle('on', mode === 'card');
    el.modeDictation.classList.toggle('on', mode === 'dictation');
    el.modeSpelling.classList.toggle('on', mode === 'spelling');
  }

  // events
  el.flip.addEventListener('click', reveal);
  el.know.addEventListener('click', () => judge('know'));
  el.blur.addEventListener('click', () => judge('blur'));
  el.dont.addEventListener('click', () => judge('dont'));
  el.checkInput.addEventListener('click', checkInput);
  el.dictInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkInput(); });

  el.modeCard.addEventListener('click', () => {
    setModeButton('card');
    const q = buildEbbinghausQueue();
    init('card', q, q.length);
  });
  el.modeDictation.addEventListener('click', () => {
    setModeButton('dictation');
    const q = buildEbbinghausQueue();
    init('dictation', q, q.length);
  });
  el.modeSpelling.addEventListener('click', () => {
    setModeButton('spelling');
    const q = buildEbbinghausQueue();
    init('spelling', q, q.length);
  });
  el.today50.addEventListener('click', () => {
    const q = buildEbbinghausQueue();
    init(state.mode || 'card', q, q.length);
  });

  el.speakEn.addEventListener('click', () => {
    const w = state.deck[state.idx];
    speak(w?.en || '', 'en-US');
  });
  el.speakZh.addEventListener('click', () => {
    const w = state.deck[state.idx];
    speak(w?.zh || '', 'zh-CN');
  });
  el.autoSpeak.addEventListener('click', () => {
    state.autoSpeak = !state.autoSpeak;
    store.autoSpeak = state.autoSpeak;
    save();
    updateAutoSpeakBtn();
  });

  el.restart.addEventListener('click', () => {
    const q = buildEbbinghausQueue();
    init(state.mode || 'card', q, q.length);
  });
  el.replayWrong.addEventListener('click', () => {
    const pool = [...state.wrongMap.values()];
    if (!pool.length) return;
    init(state.mode || 'card', pool, Math.min(BASE_ROUND, pool.length));
  });

  window.addEventListener('keydown', e => {
    if (!el.gameView.classList.contains('active')) return;
    if (e.code === 'Space') { e.preventDefault(); reveal(); }
    if (e.key === '1' && !el.know.disabled) judge('know');
    if (e.key === '2' && !el.blur.disabled) judge('blur');
    if (e.key === '3' && !el.dont.disabled) judge('dont');
  });

  // start（默认进入今日艾宾浩斯计划）
  setModeButton('card');
  const todayQueue = buildEbbinghausQueue();
  init('card', todayQueue, todayQueue.length);
})();

</script>
  
</body>
</html>
